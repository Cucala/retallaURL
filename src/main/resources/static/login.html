<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap — Acceder</title>
    <link rel="stylesheet" href="/app/css/style.css">
</head>
<body>
<div class="auth-container">
    <h1>Snap</h1>
    <p class="tagline">Acorta tus URLs</p>

    <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Registrarse</button>
    </div>

    <form id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="field">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <div id="login-error" class="error hidden"></div>
        <button type="submit" class="btn-primary" id="login-submit">Entrar</button>
    </form>

    <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
        <div class="field">
            <label for="reg-name">Nombre</label>
            <input type="text" id="reg-name" required autocomplete="name" placeholder="Tu nombre">
        </div>
        <div class="field">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="field">
            <label for="reg-password">Contraseña <span class="hint">(mínimo 8 caracteres)</span></label>
            <input type="password" id="reg-password" required autocomplete="new-password" minlength="8" placeholder="••••••••">
        </div>
        <div id="reg-error" class="error hidden"></div>
        <button type="submit" class="btn-primary" id="reg-submit">Crear cuenta</button>
    </form>
</div>

<script src="/app/js/api.js"></script>
<script src="/app/js/auth.js"></script>
</body>
</html>
